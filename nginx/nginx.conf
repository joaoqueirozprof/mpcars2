events {
    worker_connections 1024;
}

http {
    server_tokens off;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff2 application/manifest+json;

    upstream api {
        server mpcars2-api:8000;
    }

    upstream web {
        server mpcars2-web:80;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 50M;
        absolute_redirect off;

        location /api/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Request-ID' always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Max-Age 600;
                return 204;
            }

            proxy_pass http://api;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect http://72.61.129.78:80/ /;
            proxy_redirect http://72.61.129.78/ /;
            proxy_redirect http://mpcars2-api:8000/ /;

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Request-ID' always;
            add_header Access-Control-Allow-Credentials true always;
        }

        location /health {
            proxy_pass http://api;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://web;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location = /sw.js {
            proxy_pass http://web;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Service-Worker-Allowed "/";
        }

        location = /manifest.webmanifest {
            proxy_pass http://web;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        }

        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache";
        }
    }
}
