version: '3.8'

services:
  mpcars2-db:
    image: postgres:16-alpine
    container_name: mpcars2-db
    restart: always
    environment:
      POSTGRES_DB: mpcars2
      POSTGRES_USER: mpcars2
      POSTGRES_PASSWORD: ClE7dmebNoSbfv2xTBiAKxrfDwxA3L
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpcars2"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  mpcars2-pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: mpcars2-pgbouncer
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ClE7dmebNoSbfv2xTBiAKxrfDwxA3L@mpcars2-db:5432/mpcars2}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 5
      MAX_DB_CONNECTIONS: 50
      MAX_USER_CONNECTIONS: 50
    ports:
      # - "6432:5432"  # REMOVED: security risk
    depends_on:
      mpcars2-db:
        condition: service_healthy

  mpcars2-redis:
    image: redis:7-alpine
    container_name: mpcars2-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  mpcars2-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpcars2-api
    restart: always
    ports:
      - "127.0.0.1:8002:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-}@mpcars2-redis:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ClE7dmebNoSbfv2xTBiAKxrfDwxA3L@mpcars2-pgbouncer:5432/mpcars2}
      SECRET_KEY: ${SECRET_KEY}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-false}
      RUN_LEGACY_COLUMN_MIGRATIONS: ${RUN_LEGACY_COLUMN_MIGRATIONS:-false}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_DIRECTORY: ${BACKUP_DIRECTORY:-/backups}
      BACKUP_STORAGE_LABEL: ${BACKUP_STORAGE_LABEL:-Drive dedicado da VPS}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      GOOGLE_DRIVE_BACKUP_ENABLED: ${GOOGLE_DRIVE_BACKUP_ENABLED:-false}
      GOOGLE_DRIVE_SYNC_ON_BACKUP: ${GOOGLE_DRIVE_SYNC_ON_BACKUP:-true}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE: ${GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE:-}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-mpcars2-uploads}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      CLOUDFRONT_URL: ${CLOUDFRONT_URL:-}
    secrets:
      - secret_key
      - postgres_password
    depends_on:
      mpcars2-db:
        condition: service_healthy
      mpcars2-redis:
        condition: service_healthy
      mpcars2-pgbouncer:
        condition: service_started
    volumes:
      - uploads:/app/uploads
      - pdfs:/app/pdfs
      - ./backups:${BACKUP_DIRECTORY:-/backups}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  mpcars2-celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpcars2-celery
    restart: always
    command: celery -A app.celery_app worker -l info -B --concurrency=4 --max-tasks-per-child=1000
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ClE7dmebNoSbfv2xTBiAKxrfDwxA3L@mpcars2-pgbouncer:5432/mpcars2}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-}@mpcars2-redis:6379/0}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_DIRECTORY: ${BACKUP_DIRECTORY:-/backups}
      GOOGLE_DRIVE_BACKUP_ENABLED: ${GOOGLE_DRIVE_BACKUP_ENABLED:-false}
      GOOGLE_DRIVE_SYNC_ON_BACKUP: ${GOOGLE_DRIVE_SYNC_ON_BACKUP:-true}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE: ${GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE:-}
    secrets:
      - postgres_password
    depends_on:
      mpcars2-db:
        condition: service_healthy
      mpcars2-redis:
        condition: service_healthy
      mpcars2-pgbouncer:
        condition: service_started
    volumes:
      - ./backups:${BACKUP_DIRECTORY:-/backups}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G

  mpcars2-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mpcars2-web
    restart: always
    ports:
      - "127.0.0.1:3002:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M

  mpcars2-proxy:
    image: nginx:alpine
    container_name: mpcars2-proxy
    restart: always
    ports:
      - "8091:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mpcars2-api
      - mpcars2-web
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  mpcars2-pgadmin:
    image: dpage/pgadmin4
    container_name: mpcars2-pgadmin
    restart: always
    ports:
      - "127.0.0.1:8086:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mpcars.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-123456}
    secrets:
      - pgadmin_password

volumes:
  pgdata:
  uploads:
  pdfs:

secrets:
  secret_key:
    file: ./secrets/secret_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  pgadmin_password:
    file: ./secrets/pgadmin_password.txt
