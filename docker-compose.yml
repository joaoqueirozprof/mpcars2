services:
  mpcars2-db:
    image: postgres:16-alpine
    container_name: mpcars2-db
    restart: always
    environment:
      POSTGRES_DB: mpcars2
      POSTGRES_USER: mpcars2
      POSTGRES_PASSWORD: mpcars2pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpcars2"]
      interval: 5s
      timeout: 5s
      retries: 10

  mpcars2-redis:
    image: redis:7-alpine
    container_name: mpcars2-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mpcars2-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpcars2-api
    restart: always
    ports:
      - "8002:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://mpcars2:mpcars2pass@mpcars2-db:5432/mpcars2}
      REDIS_URL: ${REDIS_URL:-redis://mpcars2-redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-mpcars2-secret-key-production-2024}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-false}
      RUN_LEGACY_COLUMN_MIGRATIONS: ${RUN_LEGACY_COLUMN_MIGRATIONS:-false}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_DIRECTORY: ${BACKUP_DIRECTORY:-/backups}
      BACKUP_STORAGE_LABEL: ${BACKUP_STORAGE_LABEL:-Drive dedicado da VPS}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      GOOGLE_DRIVE_BACKUP_ENABLED: ${GOOGLE_DRIVE_BACKUP_ENABLED:-false}
      GOOGLE_DRIVE_SYNC_ON_BACKUP: ${GOOGLE_DRIVE_SYNC_ON_BACKUP:-true}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE: ${GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://72.61.129.78:3002,http://localhost:3002,http://localhost:5173}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-72.61.129.78,localhost,127.0.0.1}
    depends_on:
      mpcars2-db:
        condition: service_healthy
      mpcars2-redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - pdfs:/app/pdfs
      - ./backups:${BACKUP_DIRECTORY:-/backups}
      - ./secrets:/run/secrets:ro

  mpcars2-celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpcars2-celery
    restart: always
    command: celery -A app.celery_app worker -l info -B
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://mpcars2:mpcars2pass@mpcars2-db:5432/mpcars2}
      REDIS_URL: ${REDIS_URL:-redis://mpcars2-redis:6379/0}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_DIRECTORY: ${BACKUP_DIRECTORY:-/backups}
      GOOGLE_DRIVE_BACKUP_ENABLED: ${GOOGLE_DRIVE_BACKUP_ENABLED:-false}
      GOOGLE_DRIVE_SYNC_ON_BACKUP: ${GOOGLE_DRIVE_SYNC_ON_BACKUP:-true}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE: ${GOOGLE_DRIVE_SERVICE_ACCOUNT_FILE:-}
    depends_on:
      mpcars2-db:
        condition: service_healthy
      mpcars2-redis:
        condition: service_healthy
    volumes:
      - ./backups:${BACKUP_DIRECTORY:-/backups}
      - ./secrets:/run/secrets:ro

  mpcars2-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mpcars2-web
    restart: always
    ports:
      - "3002:80"

  mpcars2-proxy:
    image: nginx:alpine
    container_name: mpcars2-proxy
    restart: always
    ports:
      - "8091:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mpcars2-api
      - mpcars2-web

  mpcars2-pgadmin:
    image: dpage/pgadmin4
    container_name: mpcars2-pgadmin
    restart: always
    ports:
      - "8086:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mpcars.com
      PGADMIN_DEFAULT_PASSWORD: 123456

volumes:
  pgdata:
  uploads:
  pdfs:
