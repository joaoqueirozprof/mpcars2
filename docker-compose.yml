services:
  mpcars2-db:
    image: postgres:16-alpine
    container_name: mpcars2-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mpcars2}
      POSTGRES_USER: ${POSTGRES_USER:-mpcars2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpcars2"]
      interval: 5s
      timeout: 5s
      retries: 10

  mpcars2-redis:
    image: redis:7-alpine
    container_name: mpcars2-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mpcars2-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpcars2-api
    restart: always
    ports:
      - "${MPCARS2_API_PORT:-8002}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://mpcars2-redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      mpcars2-db:
        condition: service_healthy
      mpcars2-redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - pdfs:/app/pdfs

  mpcars2-celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpcars2-celery
    restart: always
    command: celery -A app.celery_app worker -l info -B
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://mpcars2-redis:6379/0}
    depends_on:
      mpcars2-db:
        condition: service_healthy
      mpcars2-redis:
        condition: service_healthy

  mpcars2-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mpcars2-web
    restart: always
    ports:
      - "${MPCARS2_WEB_PORT:-3002}:80"

  mpcars2-proxy:
    image: nginx:alpine
    container_name: mpcars2-proxy
    restart: always
    ports:
      - "${MPCARS2_PROXY_PORT:-8091}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mpcars2-api
      - mpcars2-web

  mpcars2-pgadmin:
    image: dpage/pgadmin4
    container_name: mpcars2-pgadmin
    restart: always
    ports:
      - "${MPCARS2_PGADMIN_PORT:-8086}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

volumes:
  pgdata:
  uploads:
  pdfs:
